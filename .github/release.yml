changelog:
    exclude:
        labels:
            - skip-changelog
    categories:
        - title: "✨ Features"
          labels:
              - "type: feature"
        - title: "🐛 Bug Fixes"
          labels:
              - "type: fix"
        - title: "⚡ Performance Improvements"
          labels:
              - "type: performance"
        - title: "⏪ Reverts"
          labels:
              - "type: revert"
        - title: "📚 Documentation"
          labels:
              - "type: docs"
        - title: "♻️ Refactoring"
          labels:
              - "type: refactor"
        - title: "🔧 Maintenance"
          labels:
              - "type: chore"
              - "dependencies"
